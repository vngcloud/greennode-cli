site_name: Green Node CLI
site_url: https://vngcloud.github.io/greennode-cli/
site_description: Universal Command Line Interface for Green Node
repo_url: https://github.com/vngcloud/greennode-cli
repo_name: vngcloud/greennode-cli

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Usage:
    - Getting Started: usage/getting-started.md
    - Output Formatting: usage/output.md
    - Pagination: usage/pagination.md
    - Dry-run & Confirmation: usage/dry-run.md
    - Global Options: usage/global-options.md
    - Shell Completion: usage/shell-completion.md
  - VKS Commands:
    - Overview: commands/vks/index.md
    - Cluster:
      - list-clusters: commands/vks/list-clusters.md
      - get-cluster: commands/vks/get-cluster.md
      - create-cluster: commands/vks/create-cluster.md
      - update-cluster: commands/vks/update-cluster.md
      - delete-cluster: commands/vks/delete-cluster.md
    - Node Group:
      - list-nodegroups: commands/vks/list-nodegroups.md
      - get-nodegroup: commands/vks/get-nodegroup.md
      - create-nodegroup: commands/vks/create-nodegroup.md
      - update-nodegroup: commands/vks/update-nodegroup.md
      - update-nodegroup-metadata: commands/vks/update-nodegroup-metadata.md
      - upgrade-nodegroup-version: commands/vks/upgrade-nodegroup-version.md
      - list-nodes: commands/vks/list-nodes.md
      - delete-nodegroup: commands/vks/delete-nodegroup.md
    - Versions:
      - list-cluster-versions: commands/vks/list-cluster-versions.md
    - Auto-Upgrade:
      - config-auto-upgrade: commands/vks/config-auto-upgrade.md
      - delete-auto-upgrade-config: commands/vks/delete-auto-upgrade-config.md
    - Auto-Healing:
      - config-auto-healing: commands/vks/config-auto-healing.md
    - Events:
      - get-cluster-events: commands/vks/get-cluster-events.md
    - Kubeconfig:
      - generate-kubeconfig: commands/vks/generate-kubeconfig.md
      - update-kubeconfig: commands/vks/update-kubeconfig.md
    - Quota:
      - get-quota: commands/vks/get-quota.md
    - Waiter:
      - wait: commands/vks/wait.md
  # vServer Commands are omitted from the published nav until vServer is released.
  # The pages under docs/commands/vserver/ remain for development reference.
  - Development:
    - Contributing: development/contributing.md
    - Architecture & Adding a Service: development/architecture.md
    - Release Process: development/release.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
